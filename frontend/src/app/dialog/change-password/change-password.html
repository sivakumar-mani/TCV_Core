<h5 mat-dialog-title>
   Change Password
</h5>
<mat-dialog-content  >

        <div class="grid-1col mt-4">
                <form [formGroup]="changePasswordForm">
         <app-input-form-field 
      [label]="'User Name'"
      [classLabel]="'form-label'"
      [inputClass]="'form-control'"
      [type]="'text'"
      [formControl]="$any(changePasswordForm.controls['oldPassword'])"
      ></app-input-form-field>
           <app-input-form-field 
      [label]="'User Name'"
      [classLabel]="'form-label'"
      [inputClass]="'form-control'"
      [type]="'text'"
      [formControl]="$any(changePasswordForm.controls['newPassword'])"
      ></app-input-form-field>
           <app-input-form-field 
      [label]="'User Name'"
      [classLabel]="'form-label'"
      [inputClass]="'form-control'"
      [type]="'text'"
      [formControl]="$any(changePasswordForm.controls['confirmPassword'])"
      ></app-input-form-field>
       </form>

     
        </div>
   
</mat-dialog-content>

<mat-dialog-actions>
  <div class="d-flex justify-content-between w-100">
    <button class="btn-no"  mat-raised-button mat-dialog-close>Close</button>

<h5 mat-dialog-title>
   Singup
</h5>
<mat-dialog-content  >
 <form [formGroup]="signupForm">
    <div class="grid-2-col mt-3">
        <app-input-form-field 
      [label]="'First Name'"
      [classLabel]="'form-label'"
      [inputClass]="'form-control'"
      [type]="'text'"
      [formControl]="$any(signupForm.controls['firstName'])"
      ></app-input-form-field>
         <app-input-form-field 
      [label]="'Last Name'"
      [classLabel]="'form-label'"
      [inputClass]="'form-control'"
      [type]="'text'"
      [formControl]="$any(signupForm.controls['lastName'])"
      ></app-input-form-field>
          <app-input-form-field 
      [label]="'User Name'"
      [classLabel]="'form-label'"
      [inputClass]="'form-control'"
      [type]="'text'"
      [formControl]="$any(signupForm.controls['userName'])"
      ></app-input-form-field>
        <app-input-form-field 
      [label]="'Password'"
      [classLabel]="'form-label'"
      [inputClass]="'form-control'"
      [type]="'text'"
      [formControl]="$any(signupForm.controls['password'])"
      ></app-input-form-field>
        <app-input-form-field 
      [label]="'Email'"
      [classLabel]="'form-label'"
      [inputClass]="'form-control'"
      [type]="'text'"
      [formControl]="$any(signupForm.controls['email'])"
      ></app-input-form-field>
        <app-input-form-field 
      [label]="'Contact #'"
      [classLabel]="'form-label'"
      [inputClass]="'form-control'"
      [type]="'text'"
      [formControl]="$any(signupForm.controls['contactNumber'])"
      ></app-input-form-field>
      <app-select-form-field
       [label]="'Role'"
  [labelClass]="'form-label'"
  [selectClass]="'form-control'"
  [options]="roleList"
  [formControl]="$any(signupForm.controls['role'])"></app-select-form-field>
       
  <app-select-form-field
       [label]="'Status'"
  [labelClass]="'form-label'"
  [selectClass]="'form-control'"
  [options]="[
      {value: 1, label: 'Active'},
      {value: 0, label: 'Inactive'}
      ]"
  [formControl]="$any(signupForm.controls['status'])"></app-select-form-field>
    </div>
    </form>
</mat-dialog-content>

<mat-dialog-actions>
  <div class="d-flex justify-content-between w-100">
    <button class="btn-no"  mat-raised-button mat-dialog-close>Close</button>
    <!-- <button matButton  [class]="forgotForm.valid? 'btn-yes' : 'btn-no btn-disabled'" (click)="onForgotPassword()" [disabled]="!(forgotForm.valid) || !(forgotEmailForm.valid)">Submit</button> -->
    
</div>
</mat-dialog-actions>

<h5 mat-dialog-title>
   Change Password
</h5>
<mat-dialog-content>
   <div class="grid-1col mt-4">
      <form [formGroup]="changePasswordForm">
         <app-input-form-field [label]="'Old Password'"  [classLabel]="'form-label'"
            [inputClass]="'form-control'" [type]="hide() ? 'password' : 'text'"
            [formControl]="$any(changePasswordForm.controls['oldPassword'])">

            <a type="button" class="showHideIcon" (click)="clickEvent($event)">
               <mat-icon>{{ hide() ? 'visibility_off' : 'visibility' }}</mat-icon>
            </a>

         </app-input-form-field>

         <app-input-form-field [label]="'New Password'" [classLabel]="'form-label'" [inputClass]="'form-control'"
            [type]="hide() ? 'password' : 'text'" [formControl]="$any(changePasswordForm.controls['newPassword'])">
              <a type="button" class="showHideIcon" (click)="clickEvent($event)">
               <mat-icon>{{ hide() ? 'visibility_off' : 'visibility' }}</mat-icon>
            </a>
         </app-input-form-field>
         <app-input-form-field [label]="'Confirm Password'" [classLabel]="'form-label'" [inputClass]="'form-control'"
            [type]="hide()? 'password' : 'text'" [formControl]="$any(changePasswordForm.controls['confirmPassword'])">
              <a type="button" class="showHideIcon" (click)="clickEvent($event)">
               <mat-icon>{{ hide() ? 'visibility_off' : 'visibility' }}</mat-icon>
            </a>
         </app-input-form-field>
      </form>
   </div>
</mat-dialog-content>
<mat-dialog-actions>
   <div class="d-flex justify-content-between w-100">
      <button class="btn-no" mat-raised-button mat-dialog-close>Close</button>
      <button matButton [class]="changePasswordForm.valid? 'btn-yes' : 'btn-no btn-disabled'" (click)="changePassword()"
         [disabled]="changePasswordForm.invalid || changePasswordForm.errors?.['mismatch'] ">Submit</button>
   </div>
</mat-dialog-actions>

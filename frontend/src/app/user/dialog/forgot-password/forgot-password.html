<h5 mat-dialog-title>
    Forgot Password
</h5>
<mat-dialog-content  >

        <div class="grid-1-col mt-4">
                <form [formGroup]="forgotForm">
         <app-input-form-field 
      [label]="'User Name'"
      [classLabel]="'form-label'"
      [inputClass]="'form-control'"
      [type]="'text'"
      [formControl]="$any(forgotForm.controls['userName'])"
      ></app-input-form-field>
       </form>

      <h6 class="w-100 text-center">Or</h6>
      <form [formGroup]="forgotEmailForm">
       <app-input-form-field 
      [label]="'Email'"
      [classLabel]="'form-label'"
      [inputClass]="'form-control'"
      [type]="'text'"
      [formControl]="$any(forgotEmailForm.controls['email'])"
      ></app-input-form-field>
        </form>
        </div>
   
</mat-dialog-content>

<mat-dialog-actions>
  <div class="d-flex justify-content-between w-100">
    <button class="btn-no"  mat-raised-button mat-dialog-close>Close</button>
    <!-- <button matButton  [class]="forgotForm.valid? 'btn-yes' : 'btn-no btn-disabled'" (click)="onForgotPassword()" [disabled]="!(forgotForm.valid) || !(forgotEmailForm.valid)">Submit</button> -->
     <button
  matButton
  [class]="(forgotForm.valid || forgotEmailForm.valid) ? 'btn-yes' : 'btn-no btn-disabled'"
  (click)="onForgotPassword()"
  [disabled]="!(forgotForm.valid || forgotEmailForm.valid)">
  Submit
</button>
</div>
</mat-dialog-actions>

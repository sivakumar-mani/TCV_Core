<h2 mat-dialog-title>Brands1 </h2>
<mat-dialog-content>

    <form [formGroup]="brandForm">
        <div class="grid-1-col mt-4">
            <app-input-form-field [label]="'Brand Name'" [classLabel]="'form-label'" [inputClass]="'form-control'"
                [type]="'text'" [formControl]="$any(brandForm.controls['brand_name'])"></app-input-form-field>

            <app-input-form-field *ngIf="isEditMode" [label]="'Brand Code'" [classLabel]="'form-label'" [inputClass]="'form-control'"
                [type]="'text'" [formControl]="$any(brandForm.controls['brand_code'])"></app-input-form-field>

            <app-textarea-form-field [label]="'Description'" [classLabel]="'form-label'" [rows]="2" [maxLength]="20"
                [placeholder]="'Enter the description'" [disabled]="true"
                [control]="$any(brandForm.controls['description'])">
            </app-textarea-form-field>

             <app-select-form-field *ngIf="isEditMode"
       [label]="'Role'"
  [labelClass]="'form-label'"
  [selectClass]="'form-control'"
  [options]="statusList"
  [formControl]="$any(brandForm.controls['status'])"></app-select-form-field>
        </div>
    </form>
</mat-dialog-content>
<mat-dialog-actions>
    <button class="btn-no"  mat-raised-button   mat-dialog-close>Cancel</button>
    <button *ngIf="!isEditMode"   mat-raised-button (click)="addSubmit()"  [class]="brandForm.valid? 'btn-yes' : 'btn-no btn-disabled'"
    [disabled]="!brandForm.valid">Save</button>
    <button *ngIf="isEditMode"   mat-raised-button (click)="editSubmit()"  [class]="brandForm.valid? 'btn-yes' : 'btn-no btn-disabled'"
    [disabled]="!brandForm.valid">Update</button>
</mat-dialog-actions>

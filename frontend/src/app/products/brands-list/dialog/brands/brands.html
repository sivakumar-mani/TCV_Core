<h2 mat-dialog-title>Brands </h2>
<mat-dialog-content>

    <form [formGroup]="brandForm">
        <div class="grid-1-col mt-4">
            <app-input-form-field [label]="'Brand Name'" [classLabel]="'form-label'" [inputClass]="'form-control'"
                [type]="'text'" [formControl]="$any(brandForm.controls['brandName'])"></app-input-form-field>
            <app-textarea-form-field [label]="'Description'" [classLabel]="'form-label'" [rows]="2" [maxLength]="20"
                [placeholder]="'Enter the description'" [disabled]="true"
                [control]="$any(brandForm.controls['description'])">
            </app-textarea-form-field>
        </div>
    </form>
</mat-dialog-content>
<mat-dialog-actions>
    <button class="btn-no"  mat-raised-button   mat-dialog-close>Cancel</button>
    <button    mat-raised-button (click)="onSubmit()"  [class]="brandForm.valid? 'btn-yes' : 'btn-no btn-disabled'"
    [disabled]="!brandForm.valid">Save</button>
</mat-dialog-actions>

<mat-card>
      <mat-card-header>
        <mat-card-title>{{ isEdit() ? 'Edit Category' : 'New Category' }}</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <form >
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Name</mat-label>
            <input matInput formControlName="name" required>
            <mat-error *ngIf="categoryForm.get('name')?.hasError('required')">Name is required</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" floatLabel="always" class="full-width">
            <mat-label>Slug</mat-label>
            <input matInput formControlName="slug">
            <mat-hint>SEO-friendly URL (auto-generated if empty)</mat-hint>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Parent Category</mat-label>
            <mat-select formControlName="parentId">
              <mat-option [value]="null">None (Top Level)</mat-option>
              <mat-option *ngFor="let cat of categories()" [value]="cat.category_id">{{ cat.name }}</mat-option>
            </mat-select>
          </mat-form-field>

          <mat-slide-toggle formControlName="status" class="full-width">Active</mat-slide-toggle>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Sort Order</mat-label>
            <input matInput type="number" formControlName="sortOrder">
          </mat-form-field>
        </form>
      </mat-card-content>
      <mat-card-actions>
        <button mat-raised-button color="primary" type="submit" [disabled]="categoryForm.invalid">Save</button>
        <button mat-button type="button" (click)="reset()">Reset</button>
      </mat-card-actions>
    </mat-card>

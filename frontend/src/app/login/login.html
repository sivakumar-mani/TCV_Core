<div class="login-page">

    <form [formGroup]="loginForm">
        <mat-card>
    <mat-card-header>
        <h2 class="mb-0 text-center">Welcome, TCV User!</h2>
        <p>Please log in</p>
    </mat-card-header>
    <mat-card-content>
        <div class="grid-1-col">
      <app-input-form-field 
      [label]="'User Name'"
      [classLabel]="'form-label'"
      [inputClass]="'form-control'"
      [type]="'text'"
      [formControl]="$any(loginForm.controls['userName'])"
      ></app-input-form-field>
       <app-input-form-field 
      [label]="'Password'"
      [classLabel]="'form-label'"
      [inputClass]="'form-control'"
      [type]="hide()?'password': 'text'"
      [formControl]="$any(loginForm.controls['password'])"
      >
        <a type="button" class="showHideIcon" (click)="clickEvent($event)">
               <mat-icon>{{ hide() ? 'visibility_off' : 'visibility' }}</mat-icon>
            </a>
    </app-input-form-field>
      {{responseMessage}}
   </div>
    </mat-card-content>
     <mat-card-footer class="action-btn">
      <button matButton="filled" (click)="onLogin()">Login</button>
       <a class="mt-3" (click)="forgotPassword()">Forgot Password</a>
  </mat-card-footer>
</mat-card>
</form>

</div>
